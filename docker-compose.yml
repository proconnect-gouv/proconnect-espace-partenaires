# Services for local development
services:
  postgresql:
    image: postgres:17.9
    environment:
      - POSTGRES_DB=proconnect_ep
      - POSTGRES_USER=usr
      - POSTGRES_PASSWORD=pwd
    healthcheck:
      interval: 1s
      timeout: 2s
      test:
        - CMD-SHELL
        - pg_isready --dbname proconnect_ep --username usr
    ports:
      - "5432:5432"

  # This MongoDB will be seeded with mock data at each restart
  mongo:
    image: mongo:5.0.23
    environment:
      - MONGO_INITDB_ROOT_USERNAME=fc_admin
      - MONGO_INITDB_ROOT_PASSWORD=pass
      - MONGO_INITDB_API_USERNAME=proconnect-app-api-partner
      - MONGO_INITDB_API_PASSWORD=pass
    healthcheck:
      interval: 1s
      timeout: 2s
      test:
        - CMD-SHELL
        - echo "try { rs.status() } catch (err) { rs.initiate() }" | mongosh --username fc_admin --password pass --authenticationDatabase admin --quiet

    ports:
      - "27017:27017"
    volumes:
      - ./docker/mongodb:/init:ro
    entrypoint: ["/init/entrypoint.sh"]
    tmpfs:
      - /data/db
      - /data/configdb

  pcdbapi:
    image: ghcr.io/proconnect-gouv/federation/api-partner@sha256:0f8274de80659fbcc8b8ac88a60b761109131ccadacc2cf366393e027740d580 # commit 2e99d29 - 2026-06-29
    environment:
      - MONGODB_URL=mongodb://mongo:27017/corev2?authSource=corev2&directConnection=true
      - MONGODB_USERNAME=proconnect-app-api-partner
      - MONGODB_PASSWORD=pass
      - API_SECRET=pcdb-api-secret-key
      - CLIENT_SECRET_CIPHER_PASS=test-pcdbapi-secret-cipher-passs
      - CANT_RUN_TESTS=1
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  mailcatcher:
    image: maildev/maildev:2.2.1
    ports:
      - "1080:1080"
      - "1025:1025"
